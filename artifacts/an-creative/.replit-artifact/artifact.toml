kind = "web"
previewPath = "/"
title = "A&N Creative"
version = "1.0.0"
id = "artifacts/an-creative"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21414

[services.development]
run = "pnpm --filter @workspace/an-creative run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/an-creative", "run", "build" ]
publicDir = "artifacts/an-creative/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21414"
BASE_PATH = "/"
